name: MLOps Pipeline — CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  # EC2 MLflow URI — used only in the deploy job (SSH access required).
  # The pipeline job uses a local file-based backend (no server needed).
  EC2_MLFLOW_URI: http://16.176.132.85:5000
  MLFLOW_EXPERIMENT: customer
  DOCKER_IMAGE: customer-segmentation-api
  CONTAINER_NAME: segmentation-api
  APP_PORT: 5001

# ─────────────────────────────────────────────────────────────────────────────
jobs:
# ─────────────────────────────────────────────────────────────────────────────

  # ── Job 1: API smoke tests (fast, no dataset required) ─────────────────
  test:
    name: "API Smoke Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run API smoke tests
        run: pytest tests/ -v --tb=short

  # ── Job 2: Full ML Pipeline ────────────────────────────────────────────
  pipeline:
    name: "Run ML Pipeline"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt openpyxl

      # ── Dataset acquisition (3 strategies, first match wins) ────────────
      #
      # STRATEGY 1 (recommended): Store online_retail.csv in your S3 bucket.
      #   Add secret:  DATA_URL = https://your-bucket.s3.amazonaws.com/online_retail.csv
      #
      # STRATEGY 2 (fallback):  base64-encoded .tar.gz of data/ as a GitHub secret.
      #   Add secret:  DATA_ARCHIVE_B64 = $(base64 -w0 data.tar.gz)
      #   Note: GitHub secrets max 64 KB; use this only for small datasets.
      #
      # STRATEGY 3 (auto):  Download from UCI ML Repository & convert xlsx→csv.
      #   No secret needed; requires internet access on the runner.
      # ────────────────────────────────────────────────────────────────────
      - name: Acquire dataset
        env:
          DATA_URL:          ${{ secrets.DATA_URL }}
          DATA_ARCHIVE_B64:  ${{ secrets.DATA_ARCHIVE_B64 }}
        run: |
          mkdir -p data

          if [ -n "$DATA_URL" ]; then
            echo "📥 Strategy 1: Downloading dataset from DATA_URL secret..."
            curl -fsSL "$DATA_URL" -o data/online_retail.csv
            echo "✅ Downloaded $(du -h data/online_retail.csv | cut -f1)"

          elif [ -n "$DATA_ARCHIVE_B64" ]; then
            echo "📦 Strategy 2: Restoring dataset from DATA_ARCHIVE_B64 secret..."
            echo "$DATA_ARCHIVE_B64" | base64 -d > data.tar.gz
            tar -xzf data.tar.gz
            echo "✅ Archive extracted."

          else
            echo "🌐 Strategy 3: Downloading from UCI ML Repository..."
            pip install openpyxl --quiet
            curl -fsSL \
              "https://archive.ics.uci.edu/ml/machine-learning-databases/00352/Online%20Retail.xlsx" \
              -o data/online_retail.xlsx
            echo "Converting xlsx → csv..."
            python - <<'PYEOF'
          import pandas as pd
          df = pd.read_excel("data/online_retail.xlsx", dtype=str)
          # Normalise column names to match existing scripts
          rename = {
              "Invoice":     "Invoice",
              "StockCode":   "StockCode",
              "Description": "Description",
              "Quantity":    "Quantity",
              "InvoiceDate": "InvoiceDate",
              "Price":       "Price",
              "Customer ID": "Customer ID",
              "Country":     "Country",
          }
          df.rename(columns=rename, inplace=True)
          df.to_csv("data/online_retail.csv", index=False)
          print(f"Saved {len(df):,} rows to data/online_retail.csv")
          PYEOF
            echo "✅ Converted: $(du -h data/online_retail.csv | cut -f1)"
          fi

          # Verify file exists and is non-empty
          if [ ! -s data/online_retail.csv ]; then
            echo "❌ data/online_retail.csv is missing or empty."
            exit 1
          fi

      # ── Patch mlflow.log_artifact to survive PermissionError ────────────
      # The EC2 MLflow server was started WITHOUT --serve-artifacts, so it
      # returns an absolute path (/mlruns) as the artifact URI.  The runner
      # cannot write to /mlruns.  We install a sitecustomize.py shim into
      # the active Python's site-packages directory; Python auto-imports
      # this file before every script (including subprocesses), so every
      # mlflow.log_artifact call across all 6 pipeline steps will silently
      # skip PermissionErrors instead of crashing the pipeline.
      # Metrics, params, and tags are unaffected — they still reach EC2.
      - name: Patch mlflow artifact logging for CI
        run: |
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          cat > "$SITE/sitecustomize.py" << 'PYEOF'
          try:
              import mlflow as _m
              from mlflow.tracking import MlflowClient as _C

              # ── patch fluent API (mlflow.log_artifact) ──────────────────
              _orig_fluent = _m.log_artifact
              def _safe_fluent(local_path, artifact_path=None, run_id=None):
                  try:
                      _orig_fluent(local_path, artifact_path=artifact_path,
                                   run_id=run_id)
                  except PermissionError as e:
                      print(f"[ci-patch] mlflow.log_artifact skipped: {e}")
                  except Exception as e:
                      if "Permission denied" in str(e):
                          print(f"[ci-patch] mlflow.log_artifact skipped: {e}")
                      else:
                          raise
              _m.log_artifact = _safe_fluent

              # ── patch client API (MlflowClient.log_artifact) ────────────
              _orig_client = _C.log_artifact
              def _safe_client(self, run_id, local_path,
                               artifact_path=None):
                  try:
                      _orig_client(self, run_id, local_path,
                                   artifact_path=artifact_path)
                  except PermissionError as e:
                      print(f"[ci-patch] MlflowClient.log_artifact skipped: {e}")
                  except Exception as e:
                      if "Permission denied" in str(e):
                          print(f"[ci-patch] MlflowClient.log_artifact skipped: {e}")
                      else:
                          raise
              _C.log_artifact = _safe_client

          except ImportError:
              pass   # mlflow not yet installed — nothing to patch
          PYEOF
          echo "✅ Installed MLflow CI patch in $SITE/sitecustomize.py"

      # ── Restore deleted MLflow experiment (if any) ──────────────────────
      # If the 'customer' experiment was previously soft-deleted on the EC2
      # MLflow server, mlflow.set_experiment() will raise:
      #   MlflowException: Cannot set a deleted experiment as the active experiment.
      # This step restores it (or confirms it is already active) before the
      # pipeline runs, so every script can safely call set_experiment().
      - name: Restore deleted MLflow experiment (if any)
        env:
          MLFLOW_TRACKING_URI: ${{ env.EC2_MLFLOW_URI }}
        run: |
          python - <<'PYEOF'
          import os, mlflow
          from mlflow.tracking import MlflowClient

          tracking_uri = os.environ.get("MLFLOW_TRACKING_URI", "mlruns")
          mlflow.set_tracking_uri(tracking_uri)
          client = MlflowClient()
          exp_name = "customer"

          exp = client.get_experiment_by_name(exp_name)
          if exp is None:
              print(f"ℹ️  Experiment '{exp_name}' not found — will be created fresh.")
          elif exp.lifecycle_stage == "deleted":
              print(f"⚠️  Experiment '{exp_name}' is deleted (id={exp.experiment_id}). Restoring...")
              client.restore_experiment(exp.experiment_id)
              print(f"✅ Experiment '{exp_name}' restored successfully.")
          else:
              print(f"✅ Experiment '{exp_name}' is already active (stage={exp.lifecycle_stage}).")
          PYEOF

      # ── Run the full 6-step pipeline ────────────────────────────────────
      # Metrics/params/tags  → EC2 MLflow tracking server  (visible in UI)
      # Artifacts            → skipped gracefully if /mlruns is unwritable
      #                        (fix: restart EC2 server with --serve-artifacts)
      - name: Run ML Pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ env.EC2_MLFLOW_URI }}
          MLFLOW_EXPERIMENT:   ${{ env.MLFLOW_EXPERIMENT }}
        run: python run_pipeline.py

      # ── Validate all models exist in models/ ──────────────────────────────
      # models/kmeans_model.pkl → saved by train_model.py      (Step 4)
      # models/scaler.pkl       → saved by train_model.py      (Step 4)
      # models/rf_model.pkl     → saved by train_classifier.py (Step 6)
      - name: Verify exported models
        env:
          MLFLOW_TRACKING_URI: ${{ env.EC2_MLFLOW_URI }}
          MLFLOW_EXPERIMENT:   ${{ env.MLFLOW_EXPERIMENT }}
        run: python scripts/export_models.py

      # ── Upload models for deploy job ─────────────────────────────────────
      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
          retention-days: 3

      # ── Upload MLflow artifacts for audit ───────────────────────────────
      # mlartifacts/ = PNGs, CSVs, model files logged via log_artifact()
      # mlruns/      = local metadata if any step fell back to file backend
      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            mlartifacts/
            mlruns/
          retention-days: 7
        if: always()   # upload even if pipeline partially failed

      # ── Upload pipeline outputs for audit ────────────────────────────────
      - name: Upload pipeline outputs
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            data/*.png
            data/*.csv
            data/*.txt
          retention-days: 7

  # ── Job 3: Build & Deploy to EC2 ──────────────────────────────────────
  deploy:
    name: "Build & Deploy to EC2"
    runs-on: ubuntu-latest
    needs: pipeline
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to EC2
        run: |
          rsync -avz \
            --exclude '.git' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude 'mlruns' \
            --exclude 'mlartifacts' \
            --exclude 'mlflow.db' \
            --exclude 'data/' \
            -e "ssh" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/app/

      - name: Build Docker image & restart container on EC2
        env:
          EC2_HOST:   ${{ secrets.EC2_HOST }}
          EC2_USER:   ${{ secrets.EC2_USER }}
          MLFLOW_URI: ${{ env.EC2_MLFLOW_URI }}
          APP_PORT:   ${{ env.APP_PORT }}
          IMAGE:      ${{ env.DOCKER_IMAGE }}
          CONTAINER:  ${{ env.CONTAINER_NAME }}
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} bash << ENDSSH
            set -e
            cd /home/\$USER/app

            echo "==> Building Docker image: ${IMAGE}:latest"
            docker build -t ${IMAGE}:latest .

            echo "==> Stopping old container (if any)..."
            docker stop ${CONTAINER} 2>/dev/null || true
            docker rm   ${CONTAINER} 2>/dev/null || true

            echo "==> Starting new container on port ${APP_PORT}..."
            docker run -d \
              --name ${CONTAINER} \
              --restart unless-stopped \
              -p ${APP_PORT}:${APP_PORT} \
              -e MLFLOW_TRACKING_URI=${MLFLOW_URI} \
              -e PORT=${APP_PORT} \
              ${IMAGE}:latest

            echo "==> Waiting 15s for container to start..."
            sleep 15
            docker inspect --format='{{.State.Health.Status}}' ${CONTAINER} || true
            echo "==> Deployment complete!"
          ENDSSH
